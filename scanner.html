<!-- scanner.html - ملف المسح فقط -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسح QR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: white;
        }
        
        .scanner-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        
        .header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 50px 20px 30px;
            text-align: center;
        }
        
        .header h2 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #c19a3f;
            font-size: 1rem;
        }
        
        .scan-frame {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border: 3px solid #c19a3f;
            border-radius: 30px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
        }
        
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #c19a3f;
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        
        .footer {
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 30px 20px 50px;
            text-align: center;
        }
        
        .close-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn:hover {
            background: white;
            color: black;
        }
        
        .result {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            display: none;
            border-right: 6px solid #28a745;
        }
        
        .result.success {
            border-right-color: #28a745;
        }
        
        .result.error {
            border-right-color: #dc3545;
        }
        
        @media (max-width: 768px) {
            .scan-frame {
                width: 250px;
                height: 250px;
            }
        }
    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="scanner-container">
        <video id="preview" playsinline></video>
        
        <div class="overlay">
            <div class="header">
                <h2>مسح QR Code</h2>
                <p>ضع رمز QR داخل الإطار</p>
            </div>
            
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
            
            <div class="footer">
                <button class="close-btn" onclick="closeScanner()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        
        <!-- نتيجة المسح -->
        <div id="scanResult" class="result">
            <h3 id="resultTitle"></h3>
            <div id="resultContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        let videoStream = null;
        let scanInterval = null;

        // بدء الكاميرا فوراً
        document.addEventListener('DOMContentLoaded', function() {
            startCamera();
        });

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            })
            .then(function(stream) {
                videoStream = stream;
                const video = document.getElementById('preview');
                video.srcObject = stream;
                video.play();
                startScanning();
            })
            .catch(function(error) {
                console.error('Camera error:', error);
                showError('تعذر الوصول إلى الكاميرا');
            });
        }

        function startScanning() {
            const video = document.getElementById('preview');
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            scanInterval = setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height, {
                        inversionAttempts: "dontInvert"
                    });
                    
                    if (code) {
                        // تم العثور على QR code
                        handleScanResult(code.data);
                    }
                }
            }, 500);
        }

        function handleScanResult(content) {
            try {
                const data = JSON.parse(content);
                
                if (!data || !data.id) {
                    showError('رمز QR غير صالح');
                    return;
                }

                // إيقاف المسح مؤقتاً
                stopScanning();
                
                // إرسال النتيجة إلى الصفحة الرئيسية (Admin)
                window.parent.postMessage({
                    type: 'QR_SCAN_RESULT',
                    data: data
                }, '*');
                
                showSuccess('تم المسح بنجاح');
                
            } catch (error) {
                showError('رمز QR غير صالح');
            }
        }

        function stopScanning() {
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
            
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        function showSuccess(message) {
            const result = document.getElementById('scanResult');
            const title = document.getElementById('resultTitle');
            
            result.className = 'result success';
            result.style.display = 'block';
            title.innerHTML = '✅ ' + message;
            
            setTimeout(() => {
                result.style.display = 'none';
                closeScanner();
            }, 2000);
        }

        function showError(message) {
            const result = document.getElementById('scanResult');
            const title = document.getElementById('resultTitle');
            
            result.className = 'result error';
            result.style.display = 'block';
            title.innerHTML = '❌ ' + message;
            
            setTimeout(() => {
                result.style.display = 'none';
                // إعادة تشغيل الكاميرا
                if (!videoStream) {
                    startCamera();
                }
            }, 2000);
        }

        function closeScanner() {
            stopScanning();
            // إرسال إشارة الإغلاق إلى الصفحة الرئيسية
            window.parent.postMessage({
                type: 'CLOSE_SCANNER'
            }, '*');
        }

        // استقبال رسالة إعادة التشغيل من الصفحة الرئيسية
        window.addEventListener('message', function(event) {
            if (event.data.type === 'RESTART_SCANNER') {
                startCamera();
            }
        });
    </script>
</body>
</html>
