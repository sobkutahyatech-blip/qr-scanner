<!-- scanner.html - مستمر في التصوير -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسح QR مستمر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: white;
        }
        
        .scanner-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        
        .header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 50px 20px 30px;
            text-align: center;
        }
        
        .header h2 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #c19a3f;
            font-size: 1rem;
        }
        
        .counter {
            background: #c19a3f;
            color: #005629;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
        
        .scan-frame {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border: 3px solid #c19a3f;
            border-radius: 30px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
        }
        
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #c19a3f;
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        
        .footer {
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 30px 20px 50px;
            text-align: center;
        }
        
        .close-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: white;
            color: black;
        }
        
        .notification {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            display: none;
            z-index: 2000;
            border-right: 6px solid #28a745;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .notification.success {
            border-right-color: #28a745;
        }
        
        .notification.error {
            border-right-color: #dc3545;
        }
        
        .notification.warning {
            border-right-color: #ffc107;
        }
        
        .status-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid #c19a3f;
        }
        
        .status-badge i {
            color: #28a745;
            margin-left: 5px;
        }
        
        @media (max-width: 768px) {
            .scan-frame {
                width: 250px;
                height: 250px;
            }
            
            .header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="scanner-container">
        <video id="preview" playsinline></video>
        
        <!-- إشعارات المسح -->
        <div id="notification" class="notification">
            <h3 id="notificationTitle" style="margin-bottom: 5px;"></h3>
            <p id="notificationMessage"></p>
        </div>
        
        <!-- عداد المسح -->
        <div class="status-badge">
            <i class="fas fa-check-circle"></i>
            <span id="scanCounter">0</span> شخص تم مسحهم
        </div>
        
        <div class="overlay">
            <div class="header">
                <h2>مسح QR Code</h2>
                <p>ضع رمز QR داخل الإطار للمسح التلقائي</p>
                <div class="counter" id="liveCounter">0</div>
            </div>
            
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
            
            <div class="footer">
                <button class="close-btn" onclick="closeScanner()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        let videoStream = null;
        let scanInterval = null;
        let scanCount = 0;
        let lastScanTime = 0;
        let isScanning = true;

        // بدء الكاميرا فوراً
        document.addEventListener('DOMContentLoaded', function() {
            startCamera();
        });

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            })
            .then(function(stream) {
                videoStream = stream;
                const video = document.getElementById('preview');
                video.srcObject = stream;
                video.play();
                startScanning();
                showNotification('✅ الكاميرا جاهزة', 'يمكنك البدء بمسح QR', 'success', 2000);
            })
            .catch(function(error) {
                console.error('Camera error:', error);
                showNotification('❌ خطأ في الكاميرا', 'تأكد من إذن الوصول للكاميرا', 'error', 3000);
            });
        }

        function startScanning() {
            const video = document.getElementById('preview');
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            scanInterval = setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height, {
                        inversionAttempts: "dontInvert"
                    });
                    
                    if (code) {
                        // منع المسح المتكرر لنفس QR (ثانية واحدة بين كل مسح)
                        const now = Date.now();
                        if (now - lastScanTime > 1000) {
                            lastScanTime = now;
                            handleScanResult(code.data);
                        }
                    }
                }
            }, 300); // مسح كل 300 مللي ثانية (أسرع)
        }

        function handleScanResult(content) {
            try {
                const data = JSON.parse(content);
                
                if (!data || !data.id) {
                    showNotification('❌ خطأ', 'رمز QR غير صالح', 'error', 2000);
                    return;
                }

                // إيقاف المسح مؤقتاً أثناء المعالجة
                isScanning = false;
                
                // إظهار رسالة جاري المعالجة
                showNotification('⏳ جاري التحقق', 'الرجاء الانتظار...', 'warning', 1000);
                
                // إرسال النتيجة إلى الصفحة الرئيسية
                window.parent.postMessage({
                    type: 'QR_SCAN_RESULT',
                    data: data
                }, '*');
                
                // زيادة العداد
                scanCount++;
                updateCounter();
                
                // إظهار رسالة نجاح
                showNotification('✅ تم المسح بنجاح', `الخريج: ${data.name || 'تم التعرف عليه'}`, 'success', 1500);
                
                // إعادة تشغيل المسح بعد 1.5 ثانية
                setTimeout(() => {
                    isScanning = true;
                }, 1500);
                
            } catch (error) {
                showNotification('❌ خطأ', 'رمز QR غير صالح', 'error', 2000);
                // إعادة تشغيل المسح مباشرة
                isScanning = true;
            }
        }

        function showNotification(title, message, type, duration) {
            const notification = document.getElementById('notification');
            const titleEl = document.getElementById('notificationTitle');
            const messageEl = document.getElementById('notificationMessage');
            
            notification.className = 'notification ' + type;
            titleEl.textContent = title;
            messageEl.textContent = message;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, duration);
        }

        function updateCounter() {
            document.getElementById('scanCounter').textContent = scanCount;
            document.getElementById('liveCounter').textContent = scanCount;
        }

        function stopScanning() {
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
        }

        function closeScanner() {
            stopScanning();
            
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            
            // إرسال إشارة الإغلاق
            window.parent.postMessage({
                type: 'CLOSE_SCANNER'
            }, '*');
        }

        // استقبال رسالة من الصفحة الرئيسية
        window.addEventListener('message', function(event) {
            if (event.data.type === 'SCAN_RESULT_CONFIRMED') {
                // تأكيد من الصفحة الرئيسية أن التسجيل تم
                showNotification('✅ تم التسجيل', 'تم حفظ البيانات بنجاح', 'success', 1500);
            } else if (event.data.type === 'SCAN_RESULT_ERROR') {
                // خطأ في التسجيل
                showNotification('❌ خطأ', event.data.message || 'فشل التسجيل', 'error', 2000);
                isScanning = true;
            } else if (event.data.type === 'RESTART_SCANNER') {
                isScanning = true;
            }
        });
    </script>
</body>
</html>
