<!-- scanner.html - مسح QR مع رسائل تفصيلية -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسح QR - نظام الحضور</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: white;
        }
        
        .scanner-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        
        .header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 50px 20px 30px;
            text-align: center;
        }
        
        .header h2 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #c19a3f;
            font-size: 1rem;
        }
        
        .counter {
            background: #c19a3f;
            color: #005629;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
        
        .scan-frame {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border: 3px solid #c19a3f;
            border-radius: 30px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
        }
        
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #c19a3f;
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        
        .footer {
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 30px 20px 50px;
            text-align: center;
        }
        
        .close-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: white;
            color: black;
        }
        
        /* نافذة النتائج - تصميم جديد */
        .result-panel {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border-right: 6px solid;
            display: none;
            animation: slideUp 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .result-panel.success {
            border-right-color: #28a745;
        }
        
        .result-panel.error {
            border-right-color: #dc3545;
        }
        
        .result-panel.warning {
            border-right-color: #ffc107;
        }
        
        .result-panel.info {
            border-right-color: #17a2b8;
        }
        
        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        .result-header i {
            font-size: 1.8rem;
        }
        
        .result-content {
            padding-right: 10px;
        }
        
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-label {
            color: #aaa;
            font-weight: 500;
        }
        
        .result-value {
            color: white;
            font-weight: 600;
        }
        
        .status-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid #c19a3f;
            pointer-events: none;
        }
        
        .status-badge i {
            color: #28a745;
            margin-left: 5px;
        }
        
        /* مؤقت الإشعار الصغير */
        .toast {
            position: absolute;
            top: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 50px;
            padding: 12px 20px;
            text-align: center;
            display: none;
            z-index: 2000;
            animation: fadeInOut 0.3s ease;
            pointer-events: none;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        
        @media (max-width: 768px) {
            .scan-frame {
                width: 250px;
                height: 250px;
            }
            
            .header h2 {
                font-size: 1.5rem;
            }
            
            .result-panel {
                bottom: 80px;
                padding: 15px;
            }
            
            .result-header {
                font-size: 1.1rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="scanner-container">
        <video id="preview" playsinline></video>
        
        <!-- نافذة النتائج الرئيسية -->
        <div id="resultPanel" class="result-panel">
            <div class="result-header" id="resultHeader">
                <i id="resultIcon" class="fas fa-check-circle"></i>
                <span id="resultTitle">تم المسح بنجاح</span>
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>
        
        <!-- إشعار سريع (toast) -->
        <div id="toast" class="toast">
            <span id="toastMessage"></span>
        </div>
        
        <!-- عداد المسح -->
        <div class="status-badge">
            <i class="fas fa-check-circle"></i>
            <span id="scanCounter">0</span> تم مسحهم
        </div>
        
        <div class="overlay">
            <div class="header">
                <h2>نظام حضور التخرج</h2>
                <p>ضع رمز QR داخل الإطار</p>
                <div class="counter" id="liveCounter">0</div>
            </div>
            
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
            
            <div class="footer">
                <button class="close-btn" onclick="closeScanner()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        let videoStream = null;
        let scanInterval = null;
        let scanCount = 0;
        let lastScanTime = 0;
        let isProcessing = false;
        let currentQRData = null;

        document.addEventListener('DOMContentLoaded', function() {
            startCamera();
        });

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            })
            .then(function(stream) {
                videoStream = stream;
                const video = document.getElementById('preview');
                video.srcObject = stream;
                video.play();
                startScanning();
                showToast('✅ الكاميرا جاهزة', 2000);
            })
            .catch(function(error) {
                console.error('Camera error:', error);
                showResult('error', '❌ خطأ في الكاميرا', 'تأكد من منح إذن الوصول للكاميرا');
            });
        }

        function startScanning() {
            const video = document.getElementById('preview');
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            scanInterval = setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height, {
                        inversionAttempts: "dontInvert"
                    });
                    
                    if (code) {
                        const now = Date.now();
                        if (now - lastScanTime > 1500) { // ثانية ونصف بين كل مسح
                            lastScanTime = now;
                            handleScanResult(code.data);
                        }
                    }
                }
            }, 200);
        }

        async function handleScanResult(content) {
            if (isProcessing) return;
            
            try {
                const data = JSON.parse(content);
                
                if (!data || !data.id) {
                    showResult('error', '❌ رمز QR غير صالح', 'الرمز الذي تم مسحه غير صالح');
                    return;
                }

                isProcessing = true;
                
                // إرسال للتحقق من الحالة أولاً
                await checkGraduateStatus(data.id);
                
            } catch (error) {
                showResult('error', '❌ خطأ', 'الرمز غير صالح');
                isProcessing = false;
            }
        }

        function checkGraduateStatus(registrationId) {
            return new Promise((resolve) => {
                // إرسال طلب للتحقق من حالة الخريج
                google.script.run
                    .withSuccessHandler(function(status) {
                        if (status.exists) {
                            if (status.attended) {
                                // خريج مسجل لكن حضر مسبقاً
                                showResult(
                                    'warning',
                                    '⚠️ تم تسجيل الحضور مسبقاً',
                                    `
                                        <div class="result-row">
                                            <span class="result-label">الاسم:</span>
                                            <span class="result-value">${status.fullName || '-'}</span>
                                        </div>
                                        <div class="result-row">
                                            <span class="result-label">الجامعة:</span>
                                            <span class="result-value">${status.university || '-'}</span>
                                        </div>
                                        <div class="result-row">
                                            <span class="result-label">سنة التخرج:</span>
                                            <span class="result-value">${status.graduationYear || '-'}</span>
                                        </div>
                                        <div class="result-row">
                                            <span class="result-label">الحالة:</span>
                                            <span class="result-value" style="color: #ffc107;">تم تسجيل الحضور سابقاً</span>
                                        </div>
                                    `,
                                    'warning'
                                );
                                isProcessing = false;
                                resolve({ success: false, attended: true });
                            } else {
                                // خريج موجود ولم يحضر بعد - قم بتسجيل الحضور
                                registerAttendance(registrationId, status);
                            }
                        } else {
                            // خريج غير موجود في النظام
                            showResult(
                                'error',
                                '❌ غير مسجل',
                                `
                                    <div class="result-row">
                                        <span class="result-label">رقم التسجيل:</span>
                                        <span class="result-value">${registrationId}</span>
                                    </div>
                                    <div class="result-row">
                                        <span class="result-label">الحالة:</span>
                                        <span class="result-value" style="color: #dc3545;">غير مسجل في النظام</span>
                                    </div>
                                    <div class="result-row">
                                        <span class="result-label">نصيحة:</span>
                                        <span class="result-value">تأكد من صحة الرقم أو استخدم الإدخال اليدوي</span>
                                    </div>
                                `,
                                'error'
                            );
                            isProcessing = false;
                            resolve({ success: false, exists: false });
                        }
                    })
                    .withFailureHandler(function(error) {
                        showResult('error', '❌ خطأ في الاتصال', 'حدث خطأ في التحقق من البيانات');
                        isProcessing = false;
                        resolve({ success: false });
                    })
                    .checkGraduateStatus(registrationId);
            });
        }

        function registerAttendance(registrationId, graduateInfo) {
            // تسجيل الحضور
            google.script.run
                .withSuccessHandler(function(result) {
                    if (result && result.success) {
                        // زيادة العداد
                        scanCount++;
                        updateCounter();
                        
                        // عرض نتيجة النجاح
                        showResult(
                            'success',
                            '✅ تم تسجيل الحضور',
                            `
                                <div class="result-row">
                                    <span class="result-label">الاسم:</span>
                                    <span class="result-value">${graduateInfo.fullName || '-'}</span>
                                </div>
                                <div class="result-row">
                                    <span class="result-label">الجامعة:</span>
                                    <span class="result-value">${graduateInfo.university || '-'}</span>
                                </div>
                                <div class="result-row">
                                    <span class="result-label">الكلية:</span>
                                    <span class="result-value">${graduateInfo.faculty || '-'}</span>
                                </div>
                                <div class="result-row">
                                    <span class="result-label">سنة التخرج:</span>
                                    <span class="result-value">${graduateInfo.graduationYear || '-'}</span>
                                </div>
                                <div class="result-row">
                                    <span class="result-label">رقم التسجيل:</span>
                                    <span class="result-value">${registrationId}</span>
                                </div>
                                <div class="result-row">
                                    <span class="result-label">الحالة:</span>
                                    <span class="result-value" style="color: #28a745;">تم تسجيل الحضور بنجاح ✓</span>
                                </div>
                            `,
                            'success'
                        );
                        
                        // إرسال تأكيد إلى الصفحة الرئيسية لتحديث البيانات
                        window.parent.postMessage({
                            type: 'QR_SCAN_RESULT',
                            data: { id: registrationId, name: graduateInfo.fullName, success: true }
                        }, '*');
                        
                        showToast(`✅ تم تسجيل ${graduateInfo.fullName}`, 2000);
                        
                    } else {
                        showResult(
                            'error',
                            '❌ فشل التسجيل',
                            result?.message || 'حدث خطأ أثناء تسجيل الحضور'
                        );
                    }
                    isProcessing = false;
                })
                .withFailureHandler(function(error) {
                    showResult('error', '❌ خطأ', 'حدث خطأ في الاتصال بالخادم');
                    isProcessing = false;
                })
                .markAttendance(registrationId);
        }

        function showResult(type, title, content, subType = '') {
            const panel = document.getElementById('resultPanel');
            const header = document.getElementById('resultHeader');
            const icon = document.getElementById('resultIcon');
            const titleEl = document.getElementById('resultTitle');
            const contentEl = document.getElementById('resultContent');
            
            panel.className = 'result-panel ' + type;
            contentEl.innerHTML = content;
            titleEl.textContent = title;
            
            // تغيير الأيقونة حسب النوع
            if (type === 'success') {
                icon.className = 'fas fa-check-circle';
                icon.style.color = '#28a745';
            } else if (type === 'error') {
                icon.className = 'fas fa-times-circle';
                icon.style.color = '#dc3545';
            } else if (type === 'warning') {
                icon.className = 'fas fa-exclamation-triangle';
                icon.style.color = '#ffc107';
            } else {
                icon.className = 'fas fa-info-circle';
                icon.style.color = '#17a2b8';
            }
            
            panel.style.display = 'block';
            
            // إخفاء النافذة بعد 5 ثواني
            setTimeout(() => {
                if (panel.style.display === 'block') {
                    panel.style.display = 'none';
                }
            }, 5000);
        }

        function showToast(message, duration) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.textContent = message;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        function updateCounter() {
            document.getElementById('scanCounter').textContent = scanCount;
            document.getElementById('liveCounter').textContent = scanCount;
        }

        function stopScanning() {
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
        }

        function closeScanner() {
            stopScanning();
            
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            
            window.parent.postMessage({
                type: 'CLOSE_SCANNER'
            }, '*');
        }

        // استقبال رسالة من الصفحة الرئيسية
        window.addEventListener('message', function(event) {
            if (event.data.type === 'RESTART_SCANNER') {
                isProcessing = false;
            }
        });
    </script>
</body>
</html>
