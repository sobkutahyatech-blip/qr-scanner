<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>مسح QR | حفل التخرج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: white;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1 i {
            color: #f9ca24;
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
        }

        .scanner-card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .scanner-title {
            font-size: 1.2rem;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .camera-preview {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-reader {
            width: 100%;
            min-height: 400px;
            background: #000;
        }

        #qr-reader video {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .scan-result {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            margin-top: 15px;
            text-align: center;
            border-right: 4px solid #f9ca24;
            transition: all 0.3s;
            display: none;
        }

        .scan-result.success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border-right-color: #10b981;
            display: block;
        }

        .scan-result.error {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            border-right-color: #ef4444;
            display: block;
        }

        .scan-result.info {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-right-color: #f59e0b;
            display: block;
        }

        .guest-info {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 15px;
        }

        .guest-info p {
            margin: 8px 0;
            color: #2c3e50;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            background: linear-gradient(135deg, #f9ca24, #f39c12);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn.stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .status-bar {
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 10px 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            color: white;
        }

        .status-text {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.active {
            background: #10b981;
            animation: pulse 1.5s infinite;
        }

        .status-dot.inactive {
            background: #6b7280;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 40px;
        }

        .permission-warning {
            background: #fef3c7;
            border-right: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            display: none;
        }

        @media (max-width: 600px) {
            .camera-preview {
                min-height: 350px;
            }
            #qr-reader {
                min-height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-qrcode"></i> مسح QR للدخول</h1>
            <p>ضع رمز QR الخاص بالضيف أمام الكاميرا لتسجيل الدخول</p>
        </div>

        <div class="scanner-card">
            <div class="status-bar">
                <div class="status-text">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="scannerStatusText">غير نشط</span>
                </div>
                <div class="status-text">
                    <i class="fas fa-camera"></i>
                    <span id="cameraStatus">في انتظار التشغيل</span>
                </div>
            </div>
            
            <div class="permission-warning" id="permissionWarning">
                <i class="fas fa-exclamation-triangle"></i>
                <strong>مطلوب إذن الكاميرا</strong><br>
                يرجى السماح بالوصول إلى الكاميرا لاستخدام ماسح QR
            </div>
            
            <div class="scanner-title">
                <i class="fas fa-camera"></i> كاميرا المسح
            </div>
            <div id="qr-reader" class="camera-preview"></div>
            
            <div id="scanResult" class="scan-result"></div>
            
            <div class="btn-group">
                <button id="startScanBtn" class="btn"><i class="fas fa-play"></i> تشغيل الماسح</button>
                <button id="stopScanBtn" class="btn stop" style="display: none;"><i class="fas fa-stop"></i> إيقاف الماسح</button>
            </div>
        </div>
        
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للتسجيل</a>
        <a href="admin.html" class="back-link" style="margin-top: 10px;"><i class="fas fa-chalkboard-user"></i> لوحة التحكم</a>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = "https://psiokgxrmjslvqhefuua.supabase.co";
            const SUPABASE_ANON_KEY = "sb_publishable_cbmJkhMkFVjqzw5Fbq9SSA_OT9IWMyz";
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let html5QrCode = null;
            let isScanning = false;
            let guestsList = [];
            let lastScannedId = null;
            let scannerInitialized = false;
            
            // تحميل قائمة الضيوف
            async function loadGuests() {
                try {
                    const { data, error } = await supabaseClient.from('guests').select('*');
                    if (!error && data) guestsList = data;
                    console.log('تم تحميل', guestsList.length, 'ضيف');
                } catch (error) {
                    console.error('خطأ في تحميل الضيوف:', error);
                }
            }
            
            // تحديث حالة الضيف في قاعدة البيانات
            async function updateAttendance(uniqueId, attended) {
                try {
                    const { error } = await supabaseClient
                        .from('guests')
                        .update({ attended: attended, attended_time: attended ? new Date().toISOString() : null })
                        .eq('unique_id', uniqueId);
                    
                    if (!error) {
                        await loadGuests();
                        return true;
                    }
                    return false;
                } catch (error) {
                    console.error('خطأ في تحديث الحضور:', error);
                    return false;
                }
            }
            
            // عرض رسالة النتيجة
            function showResult(type, title, message, guest = null) {
                const resultDiv = document.getElementById('scanResult');
                resultDiv.className = 'scan-result ' + type;
                
                if (type === 'success') {
                    resultDiv.innerHTML = `
                        <div style="text-align:center;">
                            <i class="fas fa-check-circle" style="font-size: 2rem; color: #10b981;"></i>
                            <h3 style="color:#10b981; margin:8px 0;">${title}</h3>
                            <div class="guest-info">
                                <p><strong>👤 الاسم:</strong> ${escapeHtml(guest?.fullname || '')}</p>
                                <p><strong>🎓 الجامعة:</strong> ${escapeHtml(guest?.university || '-')}</p>
                                <p><strong>👥 المرافقين:</strong> ${guest?.companions || 0}</p>
                            </div>
                            <p style="color:#2c3e50;">تم تسجيل الدخول بنجاح</p>
                        </div>
                    `;
                } else if (type === 'error') {
                    resultDiv.innerHTML = `
                        <div style="text-align:center;">
                            <i class="fas fa-times-circle" style="font-size: 2rem; color: #ef4444;"></i>
                            <h3 style="color:#ef4444; margin:8px 0;">${title}</h3>
                            <p>${message}</p>
                        </div>
                    `;
                } else if (type === 'info') {
                    resultDiv.innerHTML = `
                        <div style="text-align:center;">
                            <i class="fas fa-info-circle" style="font-size: 2rem; color: #f59e0b;"></i>
                            <h3 style="color:#f59e0b; margin:8px 0;">${title}</h3>
                            <p>${message}</p>
                        </div>
                    `;
                }
                
                resultDiv.style.display = 'block';
                setTimeout(() => {
                    resultDiv.style.display = 'none';
                }, 5000);
            }
            
            // معالجة QR المقروء
            async function onQRCodeScanned(decodedText) {
                // منع المسح المتكرر لنفس الـ QR
                if (lastScannedId === decodedText) return;
                lastScannedId = decodedText;
                setTimeout(() => { lastScannedId = null; }, 3000);
                
                const foundGuest = guestsList.find(g => g.unique_id === decodedText);
                
                if (foundGuest) {
                    if (!foundGuest.attended) {
                        const success = await updateAttendance(foundGuest.unique_id, true);
                        if (success) {
                            showResult('success', '✅ دخول مسموح', '', foundGuest);
                            // تحديث القائمة المحلية
                            foundGuest.attended = true;
                            foundGuest.attended_time = new Date().toISOString();
                            
                            // تنبيه صوتي
                            try {
                                const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCB3YXZlIGZvciBiZWVw');
                                audio.play().catch(()=>{});
                            } catch(e) {}
                        } else {
                            showResult('error', '❌ خطأ', 'حدث خطأ في تسجيل الدخول، حاول مرة أخرى');
                        }
                    } else {
                        const time = foundGuest.attended_time ? new Date(foundGuest.attended_time).toLocaleString('ar-SA') : 'غير محدد';
                        showResult('info', '⚠️ سبق الدخول', `تم دخول ${foundGuest.fullname} مسبقاً في ${time}`);
                    }
                } else {
                    showResult('error', '❌ QR غير معروف', 'هذا الرمز غير مسجل في النظام');
                }
            }
            
            // بدء الماسح
            async function startScanner() {
                try {
                    // تحديث حالة الواجهة
                    updateScannerStatus('جاري طلب الإذن...', 'loading');
                    
                    // التحقق من دعم الكاميرا
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('المتصفح لا يدعم الكاميرا');
                    }
                    
                    // طلب إذن الكاميرا أولاً
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    stream.getTracks().forEach(track => track.stop()); // إيقاف مؤقتاً
            
                    // إيقاف الماسح السابق إن وجد
                    if (html5QrCode) {
                        try { await html5QrCode.stop(); } catch(e) {}
                        try { await html5QrCode.clear(); } catch(e) {}
                    }
                    
                    // تهيئة الماسح
                    const scannerDiv = document.getElementById('qr-reader');
                    scannerDiv.innerHTML = '';
                    
                    html5QrCode = new Html5Qrcode("qr-reader");
                    
                    const config = {
                        fps: 15,
                        qrbox: { width: 280, height: 280 },
                        aspectRatio: 1.0,
                        videoConstraints: {
                            facingMode: "environment",
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    };
                    
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        config,
                        (decodedText) => {
                            onQRCodeScanned(decodedText);
                        },
                        (error) => {
                            // تجاهل أخطاء المسح المتكررة
                            if (error && !error.includes('No QR code found')) {
                                console.log('خطأ في المسح:', error);
                            }
                        }
                    );
                    
                    isScanning = true;
                    updateScannerStatus('نشط - جاهز للمسح', 'active');
                    
                    document.getElementById('startScanBtn').style.display = 'none';
                    document.getElementById('stopScanBtn').style.display = 'flex';
                    document.getElementById('permissionWarning').style.display = 'none';
                    
                } catch (error) {
                    console.error('خطأ في تشغيل الكاميرا:', error);
                    updateScannerStatus('غير نشط', 'inactive');
                    
                    if (error.name === 'NotAllowedError' || error.message.includes('Permission denied')) {
                        document.getElementById('permissionWarning').style.display = 'block';
                        showResult('error', '❌ مطلوب إذن الكاميرا', 'يرجى السماح بالوصول إلى الكاميرا');
                    } else if (error.name === 'NotFoundError' || error.message.includes('No camera')) {
                        showResult('error', '❌ لا توجد كاميرا', 'لا يوجد كاميرا على هذا الجهاز');
                    } else {
                        showResult('error', '❌ خطأ في الكاميرا', error.message || 'تعذر الوصول للكاميرا');
                    }
                }
            }
            
            // إيقاف الماسح
            async function stopScanner() {
                if (html5QrCode && isScanning) {
                    try {
                        await html5QrCode.stop();
                        await html5QrCode.clear();
                        isScanning = false;
                    } catch(e) {
                        console.error('خطأ في إيقاف الماسح:', e);
                    }
                }
                
                updateScannerStatus('متوقف', 'inactive');
                
                document.getElementById('startScanBtn').style.display = 'flex';
                document.getElementById('stopScanBtn').style.display = 'none';
                document.getElementById('qr-reader').innerHTML = '';
            }
            
            // تحديث حالة الماسح في الواجهة
            function updateScannerStatus(text, state) {
                const statusText = document.getElementById('scannerStatusText');
                const statusDot = document.getElementById('statusDot');
                const cameraStatus = document.getElementById('cameraStatus');
                
                if (statusText) statusText.innerText = text;
                if (cameraStatus) cameraStatus.innerText = text;
                
                if (state === 'active') {
                    statusDot.className = 'status-dot active';
                } else {
                    statusDot.className = 'status-dot inactive';
                }
            }
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            // إضافة مستمعي الأحداث
            document.getElementById('startScanBtn').addEventListener('click', startScanner);
            document.getElementById('stopScanBtn').addEventListener('click', stopScanner);
            
            // تحميل البيانات عند بدء التشغيل
            loadGuests();
            setInterval(loadGuests, 10000); // تحديث كل 10 ثوانٍ
            
            // التأكد من إغلاق الماسح عند مغادرة الصفحة
            window.addEventListener('beforeunload', () => {
                if (isScanning && html5QrCode) {
                    html5QrCode.stop().catch(()=>{});
                }
            });
            
            // التحقق من دعم الكاميرا عند تحميل الصفحة
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                document.getElementById('permissionWarning').innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i>
                    <strong>المتصفح غير مدعوم</strong><br>
                    المتصفح الحالي لا يدعم الكاميرا. يرجى استخدام Chrome أو Safari أو Edge.
                `;
                document.getElementById('permissionWarning').style.display = 'block';
                document.getElementById('startScanBtn').disabled = true;
                document.getElementById('startScanBtn').style.opacity = '0.5';
            }
        })();
    </script>
</body>
</html>
